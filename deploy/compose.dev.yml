# Yerel geliştirme — Payload için Postgres + MinIO (production stack ayrı)
# Docker Desktop grubu: kurumsal-web | container'lar: kurumsal-local-*
name: kurumsal-web
services:
  postgres:
    image: postgres:16-alpine
    container_name: kurumsal-local-postgres
    environment:
      POSTGRES_DB: redwall
      POSTGRES_USER: redwall
      POSTGRES_PASSWORD: redwall
    ports: ["5433:5432"]   # host 5433 — 5432 native Postgres ile çakışıyor
    volumes: ["redwall_pg_dev:/var/lib/postgresql/data"]
  minio:
    image: minio/minio
    container_name: kurumsal-local-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["redwall_minio_dev:/data"]
volumes:
  redwall_pg_dev:
  redwall_minio_dev:
