# SLO alarm yönlendirici — Sloth-üretimi Prometheus alarmları buradan geçer.
# Tur 1 kaynak-alarmları (disk/CPU/RAM) Grafana-managed'da KALIR; bu dosya yalnız
# SLO+meta alarmlarını yönetir ("hangi alarm nereden" → slo/README.md).
# Secret'lar: /etc/alertmanager/secrets/{telegram_bot_token,smtp_password}
# (sunucuda /opt/monitor/secrets/alertmanager/, 600, commit edilmez).
global:
  smtp_smarthost: smtp.gmail.com:587
  smtp_from: no-reply@redwall.tr             # SMTP_FROM (Step 2)
  smtp_auth_username: no-reply@redwall.tr    # SMTP_USER (Step 2)
  smtp_auth_password_file: /etc/alertmanager/secrets/smtp_password
  smtp_require_tls: true

route:
  receiver: email-warn          # varsayılan: eşleşmeyen her şey e-posta uyarı
  group_by: ['service']         # 5b: aynı servisin çift sinyali (Kuma+Traefik) TEK bildirim
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  routes:
    - matchers: ['tier="2"']    # Tier-2 her zaman yalnız e-posta (severity fark etmez)
      receiver: email-warn
    - matchers: ['severity="page"']
      receiver: urgent
    - matchers: ['severity="ticket"']
      receiver: email-warn

# 5b dedupe: tam-kesinti (availability) aynı servisin başarı/gecikme alarmlarını bastırır
# (site zaten DOWN'ken "5xx oranı yüksek" bildirimi gürültü).
inhibit_rules:
  - source_matchers: ['category="availability"']
    target_matchers: ['category=~"success|latency"']
    equal: ['service']

receivers:
  - name: urgent
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/telegram_bot_token
        # __TELEGRAM_CHAT_ID__: Alertmanager config'i native env-var genişletmeyi
        # DESTEKLEMEZ (upstream prometheus/alertmanager#2917 hâlâ açık) — bu yüzden
        # ${VAR} değil, container başlangıcında sed ile enjekte edilen dolar-işaretsiz
        # bir yer tutucu (docker-compose.yml alertmanager servisi; değer sunucu .env
        # TELEGRAM_CHAT_ID'sinden). Bu dosya /etc/alertmanager/alertmanager.yml.tmpl
        # olarak salt-okunur mount edilir, render edilmiş hali /tmp'e yazılır.
        chat_id: __TELEGRAM_CHAT_ID__
        send_resolved: true
    email_configs:
      - to: admin@redwall.tr
        send_resolved: true
  - name: email-warn
    email_configs:
      - to: admin@redwall.tr
        send_resolved: true
