# Redwall monitör ajanı — HER HEDEF SUNUCUDA çalışır (ERP, YangınPro test/self, license, kurumsal).
# Tek Grafana Alloy container'ı: host+container metriği + docker logları → monitör'e PUSH.
# Salt-okuma: docker.sock ro, host fs ro. Mevcut stack'lere/minio/postgres'e DOKUNMAZ.
# Deploy (hedefte): AGENT_HOSTNAME vs .env'de → docker compose up -d
name: redwall-agent

services:
  alloy:
    image: grafana/alloy:v1.17.1
    restart: unless-stopped
    # Container hostname = sunucu adı → node_exporter uname (nodename) ve exporter
    # instance etiketi baştan okunur gelir (erp/yp-test/... — rastgele container id değil).
    hostname: ${AGENT_HOSTNAME}
    # Güvenilir resolver: push.redwall.tr'ı hedefin yavaş DNS'i yerine Cloudflare çözer
    # (host /etc/hosts köprüsüne gerek kalmaz).
    dns:
      - 1.1.1.1
      - 1.0.0.1
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=127.0.0.1:12345
    environment:
      - AGENT_HOSTNAME=${AGENT_HOSTNAME}
      - PROM_URL=${PROM_URL}
      - PROM_USER=${PROM_USER}
      - PROM_PASS=${PROM_PASS}
      - LOKI_URL=${LOKI_URL}
      - LOKI_USER=${LOKI_USER}
      - LOKI_PASS=${LOKI_PASS}
      # Exporter adresleri (o sunucuda yoksa boş → ilgili scrape bloğu config'den çıkarılır)
      - TRAEFIK_METRICS_ADDR=${TRAEFIK_METRICS_ADDR:-}
      - PG_EXPORTER_ADDR=${PG_EXPORTER_ADDR:-}
      - REDIS_EXPORTER_ADDR=${REDIS_EXPORTER_ADDR:-}
      - MYSQL_EXPORTER_ADDR=${MYSQL_EXPORTER_ADDR:-}
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
      # node (unix) exporter — /host/* yolları
      - /:/host/root:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      # cadvisor — container cgroup/metadata için standart yollar (salt-okuma)
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    # NOT: network_mode: host KULLANILMAZ (hostname/dns ile çakışır). Ağ metrikleri
    # /host/proc/net'ten okunur; Alloy exporter'ları in-process scrape edilir.
    pid: host
    # cadvisor + unix exporter host kaynaklarına erişir (salt-okuma mount'lar).
    privileged: true
    # Köprü ağı: exporter servisleri (postgres/redis/mysql) traefik-public'te (attachable);
    # Alloy oraya katılıp servis-DNS'iyle scrape eder. Exporter yoksa (yalnız node/cadvisor)
    # MON_BRIDGE_NET tanımsız bırakılıp bu bölüm etkisiz kalır — pilotta doğrulanır.
    networks:
      - default
      - monbridge

networks:
  monbridge:
    external: true
    name: ${MON_BRIDGE_NET:-traefik-public}

volumes:
  alloy-data:
