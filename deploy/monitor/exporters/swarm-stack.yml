# Redwall monitör exporter'ları — SWARM sunucuları (license, yp-test, yp-shtest, kurumsal).
# postgres_exporter + redis_exporter, app'in DB-overlay'i + traefik-public (attachable) köprüsünde.
# Metrikler YALNIZ ağda sunulur (host portu YOK → yeni inbound yüzey yok). Alloy köprüden scrape eder.
# Deploy (hedefte, ilgili env'lerle):
#   DB_NET=<app-db-overlay> PG_HOST=<pg-servis> PG_MON_PASS=<p> [PG_DB=<db>] \
#   REDIS_HOST=<redis-servis> [REDIS_PASS=<p>] \
#   docker stack deploy -c swarm-stack.yml redwall-mon
# Servis DNS'leri: redwall-mon_postgres-exporter:9187 / redwall-mon_redis-exporter:9121
version: "3.8"

services:
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.20.1
    environment:
      DATA_SOURCE_NAME: "postgresql://monitoring:${PG_MON_PASS}@${PG_HOST}:5432/${PG_DB:-postgres}?sslmode=disable"
    networks: [dbnet, monbridge]
    deploy:
      replicas: 1
      placement:
        constraints: ["node.role == manager"]
      restart_policy:
        condition: any

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    environment:
      REDIS_ADDR: "redis://${REDIS_HOST}:6379"
      REDIS_PASSWORD: "${REDIS_PASS:-}"
    networks: [dbnet, monbridge]
    deploy:
      replicas: 1
      placement:
        constraints: ["node.role == manager"]
      restart_policy:
        condition: any

networks:
  dbnet:
    external: true
    name: ${DB_NET}
  monbridge:
    external: true
    name: traefik-public
