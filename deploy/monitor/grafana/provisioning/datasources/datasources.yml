apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: "trace_id[=:\\\"]+(\\w+)"
          url: "$${__value.raw}"
          datasourceUid: P214B5B846CF3925F
          urlDisplayLabel: "İze git"
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
