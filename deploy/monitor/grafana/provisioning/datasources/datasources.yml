apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: "trace_id[=:\\\"]+(\\w+)"
          url: "$${__value.raw}"
          datasourceUid: P214B5B846CF3925F
          urlDisplayLabel: "İze git"
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # Servis haritası (T7) — Prometheus'un GERÇEK auto-uid'i (canlıdan /api/datasources ile
      # doğrulandı: PBFA97CFB590B2093). Sabit-uid YAZMA dersi burada da geçerli — bu satır
      # datasourceUid alanı Tempo'ya değil hedef Prometheus'a işaret ettiği için elle
      # doğrulanmış gerçek değer kullanılıyor (provizyon kendisi hâlâ uid'siz kalıyor).
      serviceMap:
        datasourceUid: PBFA97CFB590B2093
