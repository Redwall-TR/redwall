# shtest-api.redwall.tr (YanginPro Self Hosted Test API) — Tier-2: yalnız
# erişilebilirlik, yalnız e-posta uyarı (severity=ticket sabit).
version: "prometheus/v1"
service: "yp-shtest-api"
labels:
  tier: "2"
slos:
  # monitor_name="YanginPro Self Hosted Test API"
  # (monitor_url="https://shtest-api.redwall.tr/api/health", canlıda doğrulandı).
  # DİKKAT: bu servisin KENDİSİ API'dir — /api/health monitörü burada BİRİNCİL.
  - name: availability
    objective: 99
    description: "shtest-api.redwall.tr (YanginPro Self Hosted Test API) dışarıdan erişilebilir (Kuma prob)"
    labels:
      category: availability
    sli:
      raw:
        error_ratio_query: max(avg_over_time((monitor_status{monitor_name="YanginPro Self Hosted Test API"} == bool 0)[{{.window}}:1m]))
    alerting:
      name: YpShtestApiAvailability
      labels:
        service: yp-shtest-api
        tier: "2"
        category: availability
      annotations:
        summary: "yp-shtest-api erişilebilirlik SLO'su hata bütçesini yakıyor"
      page_alert:
        labels:
          severity: ticket   # Tier-2: hızlı yanış bile SAYFALAMAZ — e-posta uyarı
      ticket_alert:
        labels:
          severity: ticket
