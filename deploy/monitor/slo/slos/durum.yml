# durum.redwall.tr (Kuma UI — durum sayfası) — Tier-2: yalnız erişilebilirlik,
# yalnız e-posta uyarı (severity=ticket sabit).
version: "prometheus/v1"
service: "durum"
labels:
  tier: "2"
slos:
  # monitor_name="durum.redwall.tr" (monitor_url="https://durum.redwall.tr",
  # canlıda doğrulandı) — Kuma'nın kendi durum arayüzü.
  - name: availability
    objective: 99
    description: "durum.redwall.tr (Kuma durum sayfası) dışarıdan erişilebilir (Kuma prob)"
    labels:
      category: availability
    sli:
      raw:
        error_ratio_query: max(avg_over_time((monitor_status{monitor_name="durum.redwall.tr"} == bool 0)[{{.window}}:1m]))
    alerting:
      name: DurumAvailability
      labels:
        service: durum
        tier: "2"
        category: availability
      annotations:
        summary: "durum erişilebilirlik SLO'su hata bütçesini yakıyor"
      page_alert:
        labels:
          severity: ticket   # Tier-2: hızlı yanış bile SAYFALAMAZ — e-posta uyarı
      ticket_alert:
        labels:
          severity: ticket
