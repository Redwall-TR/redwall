# auth.redwall.tr (Authentik — SSO kimlik sağlayıcısı) — Tier-2: yalnız erişilebilirlik,
# yalnız e-posta uyarı (severity=ticket sabit).
version: "prometheus/v1"
service: "auth"
labels:
  tier: "2"
slos:
  # monitor_name="Auth SSO" (monitor_url="https://auth.redwall.tr/", kabul 200-302,
  # canlıda doğrulandı) — Authentik SSO girişi.
  - name: availability
    objective: 99
    description: "auth.redwall.tr (Authentik SSO) dışarıdan erişilebilir (Kuma prob)"
    labels:
      category: availability
    sli:
      raw:
        error_ratio_query: max(avg_over_time((monitor_status{monitor_name="Auth SSO"} == bool 0)[{{.window}}:1m]))
    alerting:
      name: AuthAvailability
      labels:
        service: auth
        tier: "2"
        category: availability
      annotations:
        summary: "auth erişilebilirlik SLO'su hata bütçesini yakıyor"
      page_alert:
        labels:
          severity: ticket   # Tier-2: hızlı yanış bile SAYFALAMAZ — e-posta uyarı
      ticket_alert:
        labels:
          severity: ticket
