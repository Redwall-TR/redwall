# test-api.redwall.tr (YanginPro Test API) — Tier-2: yalnız erişilebilirlik, yalnız
# e-posta uyarı (severity=ticket sabit).
version: "prometheus/v1"
service: "yp-test-api"
labels:
  tier: "2"
slos:
  # monitor_name="YanginPro Test API" (monitor_url="https://test-api.redwall.tr/api/health",
  # canlıda doğrulandı). DİKKAT: bu servisin KENDİSİ API'dir (yp-test'ten farklı
  # olarak UI/API ayrı monitörleri var) — /api/health monitörü burada BİRİNCİL,
  # "yardımcı health" olarak dışlanmadı.
  - name: availability
    objective: 99
    description: "test-api.redwall.tr (YanginPro Test API) dışarıdan erişilebilir (Kuma prob)"
    labels:
      category: availability
    sli:
      raw:
        error_ratio_query: max(avg_over_time((monitor_status{monitor_name="YanginPro Test API"} == bool 0)[{{.window}}:1m]))
    alerting:
      name: YpTestApiAvailability
      labels:
        service: yp-test-api
        tier: "2"
        category: availability
      annotations:
        summary: "yp-test-api erişilebilirlik SLO'su hata bütçesini yakıyor"
      page_alert:
        labels:
          severity: ticket   # Tier-2: hızlı yanış bile SAYFALAMAZ — e-posta uyarı
      ticket_alert:
        labels:
          severity: ticket
