global:
  scrape_interval: 30s
  evaluation_interval: 30s

# SLO kuralları: generated/ = Sloth üretimi (slo/slos/*.yml kaynağından), static/ = elle
# (meta-monitoring). İkisi de git'te; sunucuya rsync ile gelir, reload ile yüklenir.
rule_files:
  - /etc/prometheus/rules/generated/*.rules.yml
  - /etc/prometheus/rules/static/*.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Faz 2: hedef sunucuların node_exporter'ları buraya file_sd ile eklenir.
  - job_name: node
    file_sd_configs:
      - files: ['/etc/prometheus/targets/node-*.yml']
    # Monitör kutusunun kendisi (Alloy push şemasıyla tutarlı instance adı):
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: redwall-monitor

  # Faz 2: hedef sunucuların cAdvisor'ları.
  - job_name: cadvisor
    file_sd_configs:
      - files: ['/etc/prometheus/targets/cadvisor-*.yml']

  # SLO erişilebilirlik SLI kaynağı: Kuma monitör durumları (0=down 1=up 2=pending 3=bakım).
  # Auth: Kuma API key (basic-auth, kullanıcı boş, parola=anahtar). Anahtar sunucuda
  # /opt/monitor/secrets/prometheus/kuma_api_key (600, commit edilmez).
  - job_name: kuma
    basic_auth:
      username: ''
      password_file: /etc/prometheus/secrets/kuma_api_key
    static_configs:
      - targets: ['uptime-kuma:3001']

  # Öz-telemetri (Tur 3): izleme yığınının kendisi. Yalnız iç ağ (monitor-net), dışa açılmaz.
  - job_name: loki
    static_configs: [{targets: ['loki:3100'], labels: {instance: redwall-monitor}}]
  - job_name: tempo
    static_configs: [{targets: ['tempo:3200'], labels: {instance: redwall-monitor}}]
  - job_name: grafana
    static_configs: [{targets: ['grafana:3000'], labels: {instance: redwall-monitor}}]
  - job_name: alertmanager
    static_configs: [{targets: ['alertmanager:9093'], labels: {instance: redwall-monitor}}]
  - job_name: traefik-monitor
    static_configs: [{targets: ['traefik:8082'], labels: {instance: redwall-monitor}}]
