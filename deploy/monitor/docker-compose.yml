# Monitör hub — tek düğüm, düz docker compose.
# TLS: Cloudflare "Full" origin cert doğrulamaz → Traefik self-signed sunar (tls=true, ACME yok).
# Deploy (sunucuda): docker compose up -d   (bkz. README.md)
name: monitor

networks:
  monitor-net:
    driver: bridge

volumes:
  grafana-data:
  prom-data:
  loki-data:
  kuma-data:
  am-data:

services:
  traefik:
    image: traefik:v3.7.6
    restart: unless-stopped
    # ÖN KOŞUL (host): Traefik'in Docker istemcisi API 1.24 konuşur; Docker Engine 29 min
    # API 1.40 ister → provider "client version 1.24 is too old" hatası, label okunamaz
    # (router yok → 404). ÇÖZÜM daemon tarafında: DOCKER_MIN_API_VERSION=1.24 (bkz. README
    # "Docker daemon API uyumu"). Traefik container env'i (DOCKER_API_VERSION) bunu ÇÖZMEZ.
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Öz-telemetri (Tur 3): Traefik metrikleri. Port publish YOK — Prometheus iç ağdan
      # traefik:8082 üzerinden kazır (plain-compose, dışa açılmaz).
      - --entrypoints.metrics.address=:8082
      - --metrics.prometheus=true
      - --metrics.prometheus.entrypoint=metrics
      - --metrics.prometheus.addrouterslabels=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitor-net

  uptime-kuma:
    image: louislam/uptime-kuma:2.4.0
    restart: unless-stopped
    volumes:
      - kuma-data:/app/data
    networks:
      - monitor-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=monitor-net
      - traefik.http.routers.kuma.rule=Host(`durum.${MONITOR_BASE_DOMAIN}`)
      - traefik.http.routers.kuma.entrypoints=websecure
      - traefik.http.routers.kuma.tls=true
      - traefik.http.routers.kuma.middlewares=cloudflare-ips,authentik-fa
      # authentik-fa: deploy/authentik/docker-compose.yml içinde tanımlı (cross-container,
      # plain docker provider — Tur 1'de cloudflare-ips ile aynı desen doğrulandı).
      # Sıra ÖNEMLİ: cloudflare-ips önce (doğrudan-IP hâlâ 403), authentik-fa sonra (SSO kapısı).
      - traefik.http.services.kuma.loadbalancer.server.port=3001
      # cloudflare-ips allowlist (global — plain docker provider, cross-container çalışır):
      # origin'e yalnız Cloudflare ulaşır; doğrudan-IP erişimi 403. İnsan panellerine uygulanır.
      # NOT: loki/push (ajan uçları) EKLENMEZ — ajanların CF'den geçtiği ayrıca doğrulanmalı.
      - "traefik.http.middlewares.cloudflare-ips.ipallowlist.sourcerange=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"

  prometheus:
    image: prom/prometheus:v3.13.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      # Hedef ajanlar (Alloy) metrikleri buraya remote_write ile iter (push modeli)
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prom-data:/prometheus
      - ./secrets/prometheus:/etc/prometheus/secrets:ro
      - ./slo/generated:/etc/prometheus/rules/generated:ro
      - ./slo/static:/etc/prometheus/rules/static:ro
    networks:
      - monitor-net
    # push.redwall.tr → yalnız /api/v1/write (remote-write alıcısı), basic-auth arkası.
    # Prometheus UI/API'nin geri kalanı DIŞA AÇILMAZ (yalnız bu path).
    labels:
      - traefik.enable=true
      - traefik.docker.network=monitor-net
      - traefik.http.routers.promwrite.rule=Host(`push.${MONITOR_BASE_DOMAIN}`) && Path(`/api/v1/write`)
      - traefik.http.routers.promwrite.entrypoints=websecure
      - traefik.http.routers.promwrite.tls=true
      - traefik.http.routers.promwrite.middlewares=promwrite-auth
      - traefik.http.middlewares.promwrite-auth.basicauth.users=${PROM_BASICAUTH}
      - traefik.http.services.promwrite.loadbalancer.server.port=9090

  # SLO alarm yönlendirici. DIŞA AÇILMAZ (Traefik label yok) — cloudflare-ips gerekmez.
  alertmanager:
    image: prom/alertmanager:v0.33.1   # Step 1 çıktısı
    restart: unless-stopped
    environment:
      # alertmanager.yml.tmpl'deki __TELEGRAM_CHAT_ID__ yer tutucusu, container başlangıcında
      # bu env ile değiştirilir (Alertmanager native env-var genişletmeyi desteklemiyor —
      # upstream prometheus/alertmanager#2917). Değer sunucu /opt/monitor/.env'de.
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        sed "s/__TELEGRAM_CHAT_ID__/$TELEGRAM_CHAT_ID/" /etc/alertmanager/alertmanager.yml.tmpl > /tmp/alertmanager.yml &&
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml.tmpl:ro
      - ./secrets/alertmanager:/etc/alertmanager/secrets:ro
      - am-data:/alertmanager
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  loki:
    image: grafana/loki:3.7.3
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ./loki/rules:/etc/loki/rules:ro
      - loki-data:/loki
    networks:
      - monitor-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=monitor-net
      - traefik.http.routers.loki.rule=Host(`loki.${MONITOR_BASE_DOMAIN}`)
      - traefik.http.routers.loki.entrypoints=websecure
      - traefik.http.routers.loki.tls=true
      - traefik.http.routers.loki.middlewares=loki-auth
      - traefik.http.middlewares.loki-auth.basicauth.users=${LOKI_BASICAUTH}
      - traefik.http.services.loki.loadbalancer.server.port=3100

  grafana:
    image: grafana/grafana:13.1.0
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=https://monitor.${MONITOR_BASE_DOMAIN}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      # SMTP opt-in: Faz 3'te GF_SMTP_ENABLED=true + gerçek SMTP_* verilince aktifleşir.
      # Kapalıyken Grafana from_address'i doğrulamaz → placeholder ile de açılır.
      - GF_SMTP_ENABLED=${GF_SMTP_ENABLED:-false}
      - GF_SMTP_HOST=${SMTP_HOST}
      - GF_SMTP_USER=${SMTP_USER}
      - GF_SMTP_PASSWORD=${SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${SMTP_FROM}
      # SSO (Authentik OIDC) — yerel admin formu FALLBACK olarak açık kalır (break-glass §6).
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Authentik
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GF_OAUTH_CLIENT_ID}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GF_OAUTH_CLIENT_SECRET}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://auth.redwall.tr/application/o/authorize/
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://auth.redwall.tr/application/o/token/
      - GF_AUTH_GENERIC_OAUTH_API_URL=https://auth.redwall.tr/application/o/userinfo/
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN=false
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(groups[*], 'monitor-admins') && 'Admin' || contains(groups[*], 'monitor-viewers') && 'Viewer' || 'None'
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - monitor-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=monitor-net
      - traefik.http.routers.grafana.rule=Host(`monitor.${MONITOR_BASE_DOMAIN}`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls=true
      - traefik.http.routers.grafana.middlewares=cloudflare-ips
      - traefik.http.services.grafana.loadbalancer.server.port=3000

  # Monitör kutusunun KENDİ host metrikleri (Tur 1 ajanları 5 hedefe kuruldu; kutunun
  # kendisi kördü). Alloy push şemasıyla aynı: job=node, instance=redwall-monitor.
  # DIŞA AÇILMAZ (Traefik label yok); Prometheus iç ağdan kazır.
  node-exporter:
    image: prom/node-exporter:v1.11.1   # Step 1 çıktısı
    restart: unless-stopped
    pid: host
    volumes:
      - /:/host:ro,rslave
      # Tur 3 Task 4: kutu-içi gece yedeği tazelik metriği (backup.prom) buraya yazılır.
      # ro mount: node-exporter yalnız okur, yazan box-backup.sh (host'ta root, systemd timer).
      - /var/lib/node_exporter/textfile:/var/lib/node_exporter/textfile:ro
    command:
      - --path.rootfs=/host
      - --collector.textfile.directory=/var/lib/node_exporter/textfile
    networks:
      - monitor-net
