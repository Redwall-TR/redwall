# Monitör hub — tek düğüm, düz docker compose.
# TLS: Cloudflare "Full" origin cert doğrulamaz → Traefik self-signed sunar (tls=true, ACME yok).
# Deploy (sunucuda): docker compose up -d   (bkz. README.md)
name: monitor

networks:
  monitor-net:
    driver: bridge

volumes:
  grafana-data:
  prom-data:
  loki-data:
  kuma-data:

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitor-net

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - kuma-data:/app/data
    networks:
      - monitor-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=monitor-net
      - traefik.http.routers.kuma.rule=Host(`durum.${MONITOR_BASE_DOMAIN}`)
      - traefik.http.routers.kuma.entrypoints=websecure
      - traefik.http.routers.kuma.tls=true
      - traefik.http.services.kuma.loadbalancer.server.port=3001

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prom-data:/prometheus
    networks:
      - monitor-net
