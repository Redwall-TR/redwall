# Redwall — Docker Swarm stack (Faz 1: ingress + web)
#
# Deploy (sunucuda, ortam değişkenleri export edilmiş halde):
#   docker stack deploy -c stack.yml redwall --with-registry-auth
#
# Gerekli env (CI bunları export eder, .env.example'a bak):
#   WEB_IMAGE, SITE_HOST, ACME_EMAIL, SANITY_API_READ_TOKEN, CF_DNS_API_TOKEN
#
# TLS: redwall.tr Cloudflare arkasında (proxied) → Let's Encrypt DNS-01 challenge
#      (Cloudflare API token ile). Cloudflare SSL/TLS modu "Full (strict)" olmalı.
#
# Ön koşul: `traefik-public` overlay ağı + en az bir Swarm manager düğümü.
#   docker network create --driver overlay --attachable traefik-public

networks:
  traefik-public:
    external: true

volumes:
  traefik-acme:

services:
  # ── Ingress + otomatik TLS ────────────────────────────────────────────────
  traefik:
    image: traefik:v3.3
    command:
      - --providers.swarm=true
      - --providers.swarm.exposedByDefault=false
      - --providers.swarm.network=traefik-public
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # HTTP → HTTPS kalıcı yönlendirme
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Let's Encrypt DNS-01 challenge (Cloudflare) — proxied origin ile çalışır
      - --certificatesresolvers.le.acme.dnschallenge=true
      - --certificatesresolvers.le.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.le.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
      # - --api.dashboard=true   # açarsan ayrı bir güvenli router + auth ekle
    environment:
      # Zone.DNS:Edit yetkili Cloudflare API token'ı (DNS-01 için)
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
    ports:
      # mode: host → gerçek istemci IP'si korunur (ingress mesh NAT'lamaz)
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/acme
    networks:
      - traefik-public
    deploy:
      placement:
        constraints:
          - node.role == manager   # swarm provider socket'i yöneticide
      restart_policy:
        condition: any

  # ── Next.js sitesi ────────────────────────────────────────────────────────
  web:
    image: ${WEB_IMAGE}
    environment:
      NODE_ENV: production
      # Sunucu-yalnızı sır (Sanity okuma token'ı). Sıkılaştırma için Docker
      # secret'a geçirilebilir (bkz. docs/DEPLOY-SWARM.md).
      SANITY_API_READ_TOKEN: ${SANITY_API_READ_TOKEN}
    networks:
      - traefik-public
    deploy:
      replicas: 2
      update_config:
        order: start-first   # yeni görev sağlıklı olunca eskisi düşer (sıfır kesinti)
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        # apex + www birlikte yakalanır
        - traefik.http.routers.redwall.rule=Host(`${SITE_HOST}`) || Host(`www.${SITE_HOST}`)
        - traefik.http.routers.redwall.entrypoints=websecure
        - traefik.http.routers.redwall.tls=true
        - traefik.http.routers.redwall.tls.certresolver=le
        - traefik.http.services.redwall.loadbalancer.server.port=3000
        # www → apex 301 ($${1} = Compose interpolasyonundan kaçırılmış $1)
        - traefik.http.routers.redwall.middlewares=redwall-www
        - traefik.http.middlewares.redwall-www.redirectregex.regex=^https://www\.(.*)
        - traefik.http.middlewares.redwall-www.redirectregex.replacement=https://$${1}
        - traefik.http.middlewares.redwall-www.redirectregex.permanent=true
