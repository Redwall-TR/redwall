# Redwall — Docker Swarm stack (Faz 1: ingress + web)
#
# Deploy (sunucuda, ortam değişkenleri export edilmiş halde):
#   docker stack deploy -c stack.yml redwall --with-registry-auth
#
# Gerekli env (CI bunları export eder, .env.example'a bak):
#   WEB_IMAGE, SITE_HOST
#   DATABASE_URI, PAYLOAD_SECRET, POSTGRES_PASSWORD, MINIO_ROOT_USER, MINIO_ROOT_PASSWORD
#
# TLS: redwall.tr Cloudflare arkasında (proxied), SSL modu "Full". Cloudflare origin
#      sertifikasını doğrulamaz → Traefik varsayılan self-signed cert sunar, ACME gerekmez.
#
# Payload: web imajı Payload'ı içerir; site VE /admin tamamen Payload'dan okur.
#   postgres + minio yalnız iç ağda (app-internal), dışa publish edilmez.
#
# Ön koşul: `traefik-public` overlay ağı + en az bir Swarm manager düğümü.
#   docker network create --driver overlay --attachable traefik-public

networks:
  traefik-public:
    external: true
  app-internal:
    driver: overlay
    internal: true       # postgres/minio dışarıya kapalı; yalnız servisler arası
    attachable: true     # migrate/import job'ları tek-seferlik container olarak katılabilsin

volumes:
  pgdata:
  miniodata:

services:
  # ── Ingress + otomatik TLS ────────────────────────────────────────────────
  traefik:
    image: traefik:v3.3
    command:
      - --providers.swarm=true
      - --providers.swarm.exposedByDefault=false
      - --providers.swarm.network=traefik-public
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # HTTP → HTTPS kalıcı yönlendirme
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # TLS: Cloudflare "Full" origin cert'i doğrulamaz → Traefik varsayılan
      # self-signed cert sunar (router'da tls=true yeter, ACME yok).
      # - --api.dashboard=true   # açarsan ayrı bir güvenli router + auth ekle
      #
      # NOT: Traefik swarm provider'ı Docker API 1.24 ile konuşur; Docker Engine 29
      # min API 1.40 ister. Sunucuda daemon'a DOCKER_MIN_API_VERSION=1.24 verilerek
      # 1.24 yeniden etkinleştirilir (bkz. docs/DEPLOY-SWARM.md §1).
    ports:
      # mode: host → gerçek istemci IP'si korunur (ingress mesh NAT'lamaz)
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-public
    deploy:
      placement:
        constraints:
          - node.role == manager   # swarm provider socket'i yöneticide
      restart_policy:
        condition: any

  # ── Next.js sitesi ────────────────────────────────────────────────────────
  web:
    image: ${WEB_IMAGE}
    environment:
      NODE_ENV: production
      # Site ve /admin tamamen Payload'dan okur — Postgres + MinIO (iç ağ)
      DATABASE_URI: ${DATABASE_URI}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      S3_BUCKET: redwall-media
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      # Form bildirimleri — SMTP (best-effort; boşsa e-posta atlanır, kayıt yine yapılır)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      FORM_NOTIFY_TO: ${FORM_NOTIFY_TO}
      # Turnstile (bot doğrulaması) — sunucu tarafı siteverify. Boşsa doğrulama atlanır.
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
    networks:
      - traefik-public
      - app-internal
    deploy:
      replicas: 2
      update_config:
        order: start-first   # yeni görev sağlıklı olunca eskisi düşer (sıfır kesinti)
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        # apex + www birlikte yakalanır
        - traefik.http.routers.redwall.rule=Host(`${SITE_HOST}`) || Host(`www.${SITE_HOST}`)
        - traefik.http.routers.redwall.entrypoints=websecure
        - traefik.http.routers.redwall.tls=true
        - traefik.http.services.redwall.loadbalancer.server.port=3000
        # www → apex 301 ($${1} = Compose interpolasyonundan kaçırılmış $1)
        - traefik.http.routers.redwall.middlewares=redwall-www
        - traefik.http.middlewares.redwall-www.redirectregex.regex=^https://www\.(.*)
        - traefik.http.middlewares.redwall-www.redirectregex.replacement=https://$${1}
        - traefik.http.middlewares.redwall-www.redirectregex.permanent=true

  # ── PostgreSQL (Payload DB) — yalnız iç ağda, dışa publish YOK ─────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: redwall
      POSTGRES_USER: redwall
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-internal
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

  # ── MinIO (Payload medya, S3) — yalnız iç ağda, dışa publish YOK ───────────
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    networks:
      - app-internal
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
