# Authentik SSO — monitör Traefik'ine bağlı (auth.redwall.tr). Umami/GlitchTip deseniyle:
# düz compose, /opt/authentik, secrets .env'de (600). TLS: CF-Full → tls=true, ACME yok.
# forwardAuth middleware BURADA tanımlı (sahibi auth'un kendisi — authentik çökmüşse
# forward-auth'un da çökmesi davranış değiştirmez; break-glass runbook'ta).
name: authentik

networks:
  internal:
  monitor-net:
    external: true
    name: monitor_monitor-net

volumes:
  authentik-db-data:
  authentik-media:

services:
  authentik-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_PG_PASSWORD}
    volumes:
      - authentik-db-data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  authentik-redis:
    image: redis:alpine
    command: --save 60 1 --loglevel warning
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  authentik-server:
    image: ghcr.io/goauthentik/server:2026.5.4
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASSWORD}
      AUTHENTIK_REDIS__HOST: authentik-redis
      # İlk kurulum: akadmin parolası + API token (otomasyon için) — yalnız İLK boot'ta işlenir
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    depends_on:
      authentik-db: { condition: service_healthy }
      authentik-redis: { condition: service_healthy }
    volumes:
      - authentik-media:/media
    networks: [internal, monitor-net]
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=monitor_monitor-net
      - traefik.http.routers.authentik.rule=Host(`auth.redwall.tr`)
      - traefik.http.routers.authentik.entrypoints=websecure
      - traefik.http.routers.authentik.tls=true
      # Tur 3 Task 9: cloudflare-ips artık file-provider'da (deploy/monitor/traefik/dynamic.yml).
      - traefik.http.routers.authentik.middlewares=cloudflare-ips@file
      - traefik.http.services.authentik.loadbalancer.server.port=9000
      # authentik-fa forwardAuth TANIMI Tur 3 Task 9'da file-provider'a taşındı
      # (deploy/monitor/traefik/dynamic.yml) — Kuma/Umami router'ları artık `authentik-fa@file`
      # referans veriyor. Bu container restart olsa da o router'lar artık DÜŞMEZ (Tur 1
      # kırılganlık notu kapandı). BURADA TEKRAR TANIMLAMA — tek doğru kaynak dynamic.yml.

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.5.4
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASSWORD}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    depends_on:
      authentik-db: { condition: service_healthy }
      authentik-redis: { condition: service_healthy }
    volumes:
      - authentik-media:/media
    networks: [internal]
    restart: unless-stopped
