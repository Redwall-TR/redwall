# GlitchTip hata takibi — monitör Traefik'ine bağlı (hata.redwall.tr).
# TLS: Cloudflare "Full" → Traefik self-signed sunar (tls=true, ACME yok), monitör deseniyle aynı.
# Deploy (sunucuda /opt/glitchtip): docker compose up -d
name: glitchtip

networks:
  internal:
  monitor-net:
    external: true
    name: monitor_monitor-net

volumes:
  glitchtip-db-data:

x-environment: &env
  SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
  DATABASE_URL: postgresql://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip-db:5432/glitchtip
  REDIS_URL: redis://glitchtip-redis:6379/0
  PORT: "8000"
  GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN}
  DEFAULT_FROM_EMAIL: ${GLITCHTIP_FROM_EMAIL}
  EMAIL_URL: ${GLITCHTIP_EMAIL_URL}
  # DİKKAT (keşif 2026-07-09): ENABLE_OPEN_USER_REGISTRATION aslında ENABLE_ORGANIZATION_CREATION'ı
  # kontrol ediyor (GlitchTip 6.2.0 kaynağı: glitchtip/settings.py) — e-posta/parola ile DOĞRUDAN KAYDI
  # KAPATMAZ. Doğrudan kayıt ENABLE_USER_REGISTRATION ile kapatılır (aşağıda); SSO (Authentik) ile
  # ilk-girişte otomatik hesap açma ise ayrı bayrak ENABLE_SOCIAL_APPS_USER_REGISTRATION ile kontrol
  # edilir — ikisi ayrı tutuldu ki kayıt kapalıyken SSO ile ilk giriş yine hesap açabilsin.
  ENABLE_OPEN_USER_REGISTRATION: ${GLITCHTIP_OPEN_REGISTRATION:-true}
  ENABLE_USER_REGISTRATION: ${GLITCHTIP_USER_REGISTRATION:-false}
  ENABLE_SOCIAL_APPS_USER_REGISTRATION: ${GLITCHTIP_SSO_REGISTRATION:-true}
  CELERY_WORKER_AUTOSCALE: "1,3"

services:
  glitchtip-web:
    image: glitchtip/glitchtip:latest
    depends_on:
      glitchtip-db: { condition: service_healthy }
      glitchtip-redis: { condition: service_started }
    environment: *env
    networks:
      - internal
      - monitor-net
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=monitor_monitor-net
      - traefik.http.routers.glitchtip.rule=Host(`hata.redwall.tr`)
      - traefik.http.routers.glitchtip.entrypoints=websecure
      - traefik.http.routers.glitchtip.tls=true
      # Tur 3 Task 9: cloudflare-ips artık file-provider'da (deploy/monitor/traefik/dynamic.yml).
      - traefik.http.routers.glitchtip.middlewares=cloudflare-ips@file
      - traefik.http.services.glitchtip.loadbalancer.server.port=8000
  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      glitchtip-db: { condition: service_healthy }
      glitchtip-redis: { condition: service_started }
    environment: *env
    networks:
      - internal
    restart: unless-stopped
  glitchtip-migrate:
    image: glitchtip/glitchtip:latest
    command: ./manage.py migrate
    depends_on:
      glitchtip-db: { condition: service_healthy }
    environment: *env
    networks:
      - internal
    restart: on-failure
  glitchtip-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD}
    volumes:
      - glitchtip-db-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip -d glitchtip"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
  glitchtip-redis:
    image: redis:7-alpine
    networks:
      - internal
    restart: unless-stopped
