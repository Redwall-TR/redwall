name: Build & Deploy

# main'e push → web + tools imajı build/push (Docker Hub) → SSH ile Swarm deploy
# + MinIO bucket + Payload migrate. Elle de tetiklenebilir (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/redwall-web
  TOOLS_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/redwall-tools

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Short SHA tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # web = standalone runtime imajı (servis olarak deploy edilir)
      - name: Build & push web (runner)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_UMAMI_URL=${{ vars.NEXT_PUBLIC_UMAMI_URL }}
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # tools = tam imaj (payload migrate / Sanity import job'ları için, deploy EDİLMEZ)
      - name: Build & push tools
        uses: docker/build-push-action@v6
        with:
          context: .
          target: tools
          push: true
          tags: |
            ${{ env.TOOLS_IMAGE }}:latest
            ${{ env.TOOLS_IMAGE }}:${{ steps.meta.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_UMAMI_URL=${{ vars.NEXT_PUBLIC_UMAMI_URL }}
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Swarm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy stack file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: deploy/stack.yml
          target: /opt/redwall
          strip_components: 1

      - name: Deploy stack + migrate over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          WEB_IMAGE: ${{ env.IMAGE }}:${{ needs.build.outputs.tag }}
          TOOLS_IMAGE: ${{ env.TOOLS_IMAGE }}:${{ needs.build.outputs.tag }}
          SITE_HOST: ${{ vars.SITE_HOST }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          # SMTP (form bildirimleri) — boş bırakılırsa e-posta atlanır, kayıt yine yapılır
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ vars.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ vars.SMTP_FROM }}
          FORM_NOTIFY_TO: ${{ vars.FORM_NOTIFY_TO }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: WEB_IMAGE,TOOLS_IMAGE,SITE_HOST,PAYLOAD_SECRET,POSTGRES_PASSWORD,MINIO_ROOT_USER,MINIO_ROOT_PASSWORD,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM,FORM_NOTIFY_TO,TURNSTILE_SECRET_KEY
          command_timeout: 15m
          script: |
            set -e
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker network create --driver overlay --attachable traefik-public 2>/dev/null || true
            export DATABASE_URI="postgres://redwall:${POSTGRES_PASSWORD}@postgres:5432/redwall"

            cd /opt/redwall
            docker stack deploy -c stack.yml redwall --with-registry-auth --detach=true

            echo "Ağ + servisler hazırlanıyor..."
            for i in $(seq 1 30); do docker network inspect redwall_app-internal >/dev/null 2>&1 && break; sleep 2; done

            echo "Postgres hazır mı bekleniyor..."
            for i in $(seq 1 40); do
              docker run --rm --network redwall_app-internal postgres:16-alpine pg_isready -h postgres -U redwall >/dev/null 2>&1 && break
              sleep 3
            done

            echo "Migration öncesi yedek (best-effort)..."
            PG=$(docker ps -qf name=redwall_postgres | head -1)
            if [ -n "$PG" ]; then
              mkdir -p /opt/redwall/backups
              docker exec "$PG" pg_dump -U redwall redwall 2>/dev/null | gzip > "/opt/redwall/backups/pre-migrate-$(date +%Y%m%d-%H%M%S).sql.gz" || true
            fi

            echo "MinIO bucket (idempotent)..."
            MINIO=$(docker ps -qf name=redwall_minio | head -1)
            if [ -n "$MINIO" ]; then
              docker exec "$MINIO" sh -c "mc alias set l http://127.0.0.1:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD && mc mb -p l/redwall-media" || true
            fi

            echo "Payload migrate (şema)..."
            docker run --rm --network redwall_app-internal \
              -e DATABASE_URI="$DATABASE_URI" -e PAYLOAD_SECRET="$PAYLOAD_SECRET" \
              "$TOOLS_IMAGE" npx payload migrate

            echo "Disk temizliği (eski imajlar + yedekler)..."
            # Bu deploy'un sha'sı ve latest hariç eski redwall imajlarını kaldır
            # (her deploy ~2.2GB tools imajı biriktiriyor → disk dolup MinIO yazamıyor).
            CUR_TAG="${WEB_IMAGE##*:}"
            docker image ls --format '{{.Repository}}:{{.Tag}}' \
              | grep -E 'redwall-(web|tools):' \
              | grep -vE ":(${CUR_TAG}|latest)\$" \
              | xargs -r docker rmi 2>/dev/null || true
            docker image prune -f >/dev/null 2>&1 || true
            # Son 10 migrate yedegi haric eskileri sil
            ls -1t /opt/redwall/backups/pre-migrate-*.sql.gz 2>/dev/null | tail -n +11 | xargs -r rm -f || true

            echo "Deploy + migrate + temizlik tamam."
